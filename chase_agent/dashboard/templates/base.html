<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Chase Maximizer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }
      body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#fafafa',
              surface: '#ffffff',
              border: '#e5e7eb',
              ink: { DEFAULT: '#111827', muted: '#6b7280', subtle: '#9ca3af' },
              healthy: { DEFAULT: '#10b981', soft: '#d1fae5' },
              urgent: { DEFAULT: '#f59e0b', soft: '#fef3c7' },
              critical: { DEFAULT: '#ef4444', soft: '#fee2e2' },
              inactive: { DEFAULT: '#9ca3af', soft: '#f3f4f6' },
              accent: { DEFAULT: '#4f46e5', soft: '#eef2ff' },
            },
            boxShadow: {
              card: '0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.02)',
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-bg text-ink antialiased">
    <main class="max-w-7xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
